<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Riide In Map</title>

    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .leaflet-control-attribution {
            font-size: 10px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
        }

        .leaflet-control-attribution a {
            color: #9adbe8;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        keyboard: false,
        tap: false,
        touchZoom: false
    }).setView([27.7172, 85.3240], 15);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const pickupMarker = L.marker([27.7172, 85.3240]).addTo(map);
    const destinationMarker = L.marker([27.7215, 85.3318]).addTo(map);

    const routeLine = L.polyline([
        [27.7172, 85.3240],
        [27.7190, 85.3270],
        [27.7215, 85.3318]
    ], {
        color: '#63B7C4',
        weight: 6,
        opacity: 0.9
    }).addTo(map);
</script>

</body>
</html>
