<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vehicle Selection Map</title>

    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #map {
            height: 100%;
            width: 100%;
        }

        .leaflet-control-attribution {
            font-size: 10px;
            background: rgba(0, 0, 0, 0.4);
            color: white;
        }

        .leaflet-control-attribution a {
            color: #9adbe8;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map', {
        zoomControl: false,
        dragging: false,
        scrollWheelZoom: false,
        doubleClickZoom: false,
        boxZoom: false,
        keyboard: false,
        tap: false,
        touchZoom: false
    }).setView([27.7172, 85.3240], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    window.setRoute = function(fromLat, fromLon, toLat, toLon) {
        if (window.pickupMarker) map.removeLayer(window.pickupMarker);
        if (window.destinationMarker) map.removeLayer(window.destinationMarker);
        if (window.routeLine) map.removeLayer(window.routeLine);

        const fromPoint = [parseFloat(fromLat), parseFloat(fromLon)];
        const toPoint = [parseFloat(toLat), parseFloat(toLon)];

        window.pickupMarker = L.marker(fromPoint).addTo(map);
        window.destinationMarker = L.marker(toPoint).addTo(map);

        window.routeLine = L.polyline([
            fromPoint,
            [(fromPoint[0] + toPoint[0]) / 2, (fromPoint[1] + toPoint[1]) / 2],
            toPoint
        ], {
            color: '#63B7C4',
            weight: 6,
            opacity: 0.9
        }).addTo(map);

        const bounds = L.latLngBounds([fromPoint, toPoint]);
        map.fitBounds(bounds, { padding: [40, 40] });
    };
</script>

</body>
</html>
